# ══════════════════════════════════════════════════════════
# SpamShield AI — CI/CD Pipeline
# Triggers: push to main/develop, pull requests
# Stages: Lint → Test → Build → Push → Deploy
# ══════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/spamshield

jobs:
  # ── Stage 1: Lint & Type Check ──────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Type check
        run: mypy backend/ --ignore-missing-imports
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
        continue-on-error: true

  # ── Stage 2: Backend Tests ─────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DB_POSTGRES_HOST: localhost
          DB_POSTGRES_USER: test_user
          DB_POSTGRES_PASSWORD: test_pass
          DB_POSTGRES_DB: test_db
          DB_REDIS_HOST: localhost
          SEC_JWT_SECRET_KEY: test-secret-key
          ENVIRONMENT: testing
        run: pytest tests/ -v --tb=short
        continue-on-error: true

  # ── Stage 3: Build & Push Docker Images ────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 4: Deploy (placeholder) ──────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Deploying SpamShield AI"
          echo "Backend image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}"
          echo "Frontend image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}"
          echo "Ready for kubectl apply or helm upgrade"
