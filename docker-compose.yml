# ══════════════════════════════════════════════════════════
# SpamShield AI — Docker Compose
# Full stack: Backend + Frontend + PostgreSQL + Redis + Nginx
# ══════════════════════════════════════════════════════════
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Stream logs
#   docker compose down -v        # Stop and remove volumes
# ══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: spamshield-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER:-spam_user}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${DB_POSTGRES_DB:-spam_detection}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spam_user -d spam_detection"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spamshield

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: spamshield-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spamshield

  # ── Backend (FastAPI) ───────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: spamshield-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_POSTGRES_HOST=postgres
      - DB_POSTGRES_PORT=5432
      - DB_POSTGRES_USER=${DB_POSTGRES_USER:-spam_user}
      - DB_POSTGRES_PASSWORD=${DB_POSTGRES_PASSWORD:-changeme_in_production}
      - DB_POSTGRES_DB=${DB_POSTGRES_DB:-spam_detection}
      - DB_REDIS_HOST=redis
      - DB_REDIS_PORT=6379
      - SEC_JWT_SECRET_KEY=${SEC_JWT_SECRET_KEY:-dev-secret-change-in-prod}
      - ENVIRONMENT=development
    volumes:
      - model_data:/app/models
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - spamshield

  # ── Frontend (Next.js) ─────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: spamshield-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    ports:
      - "3000:3000"
    networks:
      - spamshield

  # ── Nginx Reverse Proxy ────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: spamshield-proxy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - spamshield

volumes:
  postgres_data:
  redis_data:
  model_data:

networks:
  spamshield:
    driver: bridge
