resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    # Health check endpoint
    location /health {
        set $backend_health http://backend:8000/health;
        proxy_pass $backend_health;
        proxy_set_header Host $host;
    }

    # API routes → Backend
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        set $backend_api http://backend:8000;
        proxy_pass $backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # OpenAPI docs → Backend
    location /docs {
        set $backend_docs http://backend:8000/docs;
        proxy_pass $backend_docs;
        proxy_set_header Host $host;
    }
    location /redoc {
        set $backend_redoc http://backend:8000/redoc;
        proxy_pass $backend_redoc;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        set $backend_openapi http://backend:8000/openapi.json;
        proxy_pass $backend_openapi;
        proxy_set_header Host $host;
    }

    # Everything else → Frontend
    location / {
        set $frontend_app http://frontend:3000;
        proxy_pass $frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        set $frontend_assets http://frontend:3000;
        proxy_pass $frontend_assets;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
